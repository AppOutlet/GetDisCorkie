<section class="pricing-section">
  <app-section-header
    i18n-title title="Simple and transparent pricing"
    i18n-subtitle subtitle="Choose the tier that best suits your forum-browsing needs."
  ></app-section-header>

  <div class="container">
    <div class="row justify-content-center g-4">
      <!-- Free Tier -->
      <div class="col-lg-5 col-md-6 d-flex">
        <app-card-panel style="width: 100%;">
          <div class="text-center mb-4">
            <h3 class="mat-headline-4 m-0" i18n>Free</h3>
            <div class="price-display">
              <span class="mat-display-1 m-0" i18n>$0</span>
              <span class="mat-body-2 period" i18n>/month</span>
            </div>
            <p class="mat-body-1 m-0 opacity-75" i18n>Perfect for individual forum enthusiasts starting their journey.</p>
          </div>

          <hr class="divider">

          <ul class="feature-list">
            <li *ngFor="let feature of freeFeatures" class="feature-item">
              <mat-icon fontSet="ph" fontIcon="ph-check-circle" class="icon-primary"></mat-icon>
              <span class="mat-body-1">{{ feature }}</span>
            </li>
          </ul>
        </app-card-panel>
      </div>

      <!-- Pro Tier -->
      <div class="col-lg-5 col-md-6 d-flex">
        <app-card-panel [highlighted]="true" style="width: 100%;">
          <div class="text-center mb-4">
            <h3 class="mat-headline-4 m-0" i18n>DisCorkie+</h3>
            <div class="price-display">
              <span class="mat-display-1 m-0" i18n>$1.5</span>
              <span class="mat-body-2 period" i18n>/month</span>
            </div>
            <p class="mat-body-1 m-0 opacity-75" i18n>Power features for the most active forum participants and curators.</p>
          </div>

          <hr class="divider">

          <ul class="feature-list">
            <li *ngFor="let feature of proFeatures" class="feature-item">
              <mat-icon fontSet="ph" fontIcon="ph-star" class="icon-primary"></mat-icon>
              <span class="mat-body-1">{{ feature }}</span>
            </li>
          </ul>
        </app-card-panel>
      </div>
    </div>
  </div>
</section>
