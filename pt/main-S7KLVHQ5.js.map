<div id="download" class="separator"></div>
<section class="download-section">
  <div class="container">

    <!-- Hero Header (Moved out of columns) -->
    <app-section-header
      i18n-title title="Download DisCorkie"
      i18n-subtitle subtitle="Simplify the way you explore and engage in online discussions. Choose your platform below."
    ></app-section-header>

    <div class="row align-items-center justify-content-center g-5">

      <!-- Left Column: Image (Hidden on small screens) -->
      <div class="col-lg-4 d-none d-lg-block text-center">
        <div class="image-container">
          <img src="img/download/devices.avif" alt="DisCorkie on multiple devices" class="img-fluid devices-image" />
        </div>
      </div>

      <!-- Right Column: Download Panel -->
      <div class="col-lg-8">
        <app-card-panel>

          <!-- Windows -->
          <div class="platform-row">
            <div class="platform-info">
              <div class="icon-circle">
                <mat-icon fontSet="ph" fontIcon="ph-windows-logo"></mat-icon>
              </div>
              <div class="platform-text">
                <h3>Windows</h3>
                <span>Windows 10/11</span>
              </div>
            </div>
            <a href="https://apps.microsoft.com/detail/9P2ZK3MNXXKK?referrer=appbadge&mode=full" target="_blank"
              rel="noopener noreferrer" class="store-badge" data-umami-event="download-microsoft-store">
              <img src="https://get.microsoft.com/images/en-us%20dark.svg" alt="Get it on Microsoft Store" />
            </a>
          </div>

          <!-- Linux -->
          <div class="platform-row">
            <div class="platform-info">
              <div class="icon-circle">
                <mat-icon fontSet="ph" fontIcon="ph-linux-logo"></mat-icon>
              </div>
              <div class="platform-text">
                <h3>Linux</h3>
                <span>Flatpak & Snap</span>
              </div>
            </div>
            <div class="badge-group">
              <a href="https://flathub.org/apps/dev.appoutlet.DisCorkie" target="_blank" rel="noopener noreferrer"
                class="store-badge" data-umami-event="download-flathub">
                <img alt="Get it on Flathub" src="https://flathub.org/api/badge?locale=en" />
              </a>
              <a href="https://snapcraft.io/discorkie" target="_blank" rel="noopener noreferrer" class="store-badge"
                data-umami-event="download-snap">
                <img alt="Get it from the Snap Store" src="https://snapcraft.io/en/dark/install.svg" />
              </a>
            </div>
          </div>

          <!-- Android -->
          <div class="platform-row">
            <div class="platform-info">
              <div class="icon-circle">
                <mat-icon fontSet="ph" fontIcon="ph-android-logo"></mat-icon>
              </div>
              <div class="platform-text">
                <h3>Android</h3>
                <span>Mobile & Tablet</span>
              </div>
            </div>
            <a href="https://play.google.com/store/apps/details?id=dev.appoutlet.DisCorkie" target="_blank"
              rel="noopener noreferrer" class="store-badge" data-umami-event="download-google-play">
              <img src="img/download/google-play-store.avif" alt="Get it on Google Play" />
            </a>
          </div>

          <!-- iOS -->
          <div class="platform-row coming-soon">
            <div class="platform-info">
              <div class="icon-circle">
                <mat-icon fontSet="ph" fontIcon="ph-apple-logo"></mat-icon>
              </div>
              <div class="platform-text">
                <h3>iOS & macOS</h3>
                <span>Apple Ecosystem</span>
              </div>
            </div>
            <span class="status-badge" i18n>Coming Soon</span>
          </div>

        </app-card-panel>
      </div>

    </div>
  </div>
</section>
